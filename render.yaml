services:
  # ── API ─────────────────────────────────────────────────────────────────────
  - type: web
    name: hokse-ai-api
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install uv && uv sync
    startCommand: uv run uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Render injects PORT automatically; expose it to Settings via API_PORT
      - key: API_PORT
        fromVariable: PORT
      - key: API_HOST
        value: 0.0.0.0
      - key: LOG_LEVEL
        value: info

      # MongoDB Atlas — fill in Render dashboard or set here
      - key: NOSQL_DB_HOST
        sync: false
      - key: NOSQL_DB_PORT
        value: "27017"
      - key: NOSQL_DB_USER
        sync: false
      - key: NOSQL_DB_PASSWORD
        sync: false
      - key: NOSQL_DB_NAME
        sync: false

      # LLM — use google (Gemini) on Render; Ollama is local-only
      - key: LLM_PROVIDER
        value: google
      - key: LLM_MODEL
        value: gemini-1.5-flash
      - key: LLM_API_KEY
        sync: false

      # Strava OAuth
      # IMPORTANT: set STRAVA_REDIRECT_URI to https://<your-api>.onrender.com/auth/callback
      - key: STRAVA_CLIENT_ID
        sync: false
      - key: STRAVA_CLIENT_SECRET
        sync: false
      - key: STRAVA_OAUTH_URL
        value: https://www.strava.com/oauth/authorize
      - key: STRAVA_TOKEN_URL
        value: https://www.strava.com/oauth/token
      - key: STRAVA_API_URL
        value: https://www.strava.com/api/v3
      - key: STRAVA_REDIRECT_URI
        sync: false   # set to: https://hokse-ai-api.onrender.com/auth/callback
      - key: STRAVA_SCOPE
        value: activity:read_all

      # UI redirect after OAuth — point to the UI service URL
      - key: UI_HOST
        sync: false   # set to: hokse-ai-ui.onrender.com
      - key: UI_PORT
        value: "443"

  # ── UI (Streamlit) ───────────────────────────────────────────────────────────
  - type: web
    name: hokse-ai-ui
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install uv && uv sync
    startCommand: uv run streamlit run ui/app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      # Point the UI at the deployed API — set to https://hokse-ai-api.onrender.com
      - key: API_BASE_URL
        sync: false   # set to: https://hokse-ai-api.onrender.com
