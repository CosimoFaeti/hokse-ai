services:
  # ── API ─────────────────────────────────────────────────────────────────────
  - type: web
    name: hokse-ai-api
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install uv && uv sync
    startCommand: uv run uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: API_HOST
        value: 0.0.0.0
      - key: LOG_LEVEL
        value: info
      # MongoDB
      - key: NOSQL_DB_PORT
        value: "27017"
      # LLM
      - key: LLM_PROVIDER
        value: google
      - key: LLM_MODEL
        value: gemini-2.0-flash-lite
      # Strava OAuth (public, non-secret URLs)
      - key: STRAVA_OAUTH_URL
        value: https://www.strava.com/oauth/authorize
      - key: STRAVA_TOKEN_URL
        value: https://www.strava.com/oauth/token
      - key: STRAVA_API_URL
        value: https://www.strava.com/api/v3
      - key: STRAVA_SCOPE
        value: activity:read_all
      # UI redirect after OAuth
      - key: UI_PORT
        value: "443"

  # ── UI (Streamlit) ───────────────────────────────────────────────────────────
  - type: web
    name: hokse-ai-ui
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install uv && uv sync
    startCommand: uv run streamlit run ui/app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
